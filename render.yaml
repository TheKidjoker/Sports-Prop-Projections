services:
  - type: web
    name: jokers-edge
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd ..
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 600
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: SCAN_GAME_WORKERS
        value: "4"
      - key: SCAN_API_WORKERS
        value: "4"
      - key: GNEWS_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ADMIN_EMAILS
        value: "chance.kelly2003@gmail.com"
      - key: PYTHON_VERSION
        value: 3.11.4
